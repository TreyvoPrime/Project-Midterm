<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc of Napoleon</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <button id="restart_button">Restart Story</button>
    <h1 id="main_heading">Napoleon's Coronation</h1>

    <div id="scene_coronation" class="scene active">
        <div class="image_container">
            <img id="images" src="./Images/coronation_scene.jpg">
            <img id="second_image" class="hidden_image">
            <img src="./Images/napoleon_standing.png" class="napoleon">
        </div>

        <p id="message">
        </p>

        <button id="decision_one"></button>
        <button id="decision_two"></button>
        <div id="battle_controls" style="display:none;">
            <button id="make_ready">Make Ready</button>
            <button id="make_present">Present Arms</button>
            <button id="fire">Fire</button>  </div>
    </div>

</body>

</html>
